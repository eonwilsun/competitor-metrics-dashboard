<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" href="data:,">
  <title>Competitor Metrics Dashboard</title>
  <style>
    /* (same styles as before - kept concise) */
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; padding: 18px; background:#fafafa; color:#111; }
    .collect-row { margin: 10px 0 12px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .collect-row button { padding:8px 12px; border-radius:10px; cursor:pointer; font-weight:700; }
    #collectDataBtn { background:#ef5d2f; color:#000; border:1px solid #000; }
    #triggerWorkflowBtn { background:#0b74de; color:#fff; border:1px solid #074a9e; }
    #testZapBtn { background:#0ea5a4; color:#fff; border:1px solid #065f5b; }
    .desc { color:#666; font-size:13px; }
  </style>
</head>
<body>
  <h1>Competitor Metrics Dashboard</h1>
  <p id="lastUpdated"></p>

  <div class="collect-row">
    <button id="collectDataBtn" type="button">Collect data (Zapier)</button>
    <button id="triggerWorkflowBtn" type="button">Trigger GitHub Action (server)</button>
    <button id="testZapBtn" type="button">Send test to Zap</button>
    <span class="desc">Use the blue button to trigger the GitHub Action (safe; no PAT in browser). Use test for Zapier trigger.</span>
  </div>

  <div id="metricsDisplay">Loading dashboard…</div>

  <script src="assets/app.js"></script>
</body>
</html>
