<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" href="data:,">
  <title>Competitor Metrics Dashboard</title>

  <style>
    .hidden { display: none !important; }

    .lockscreen {
      max-width: 560px;
      margin: 48px auto;
      padding: 18px;
      border: 1px solid #e6e6e6;
      border-radius: 12px;
      background: #fff;
    }
    .lockscreen input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 8px;
      box-sizing: border-box;
    }
    .lockscreen .actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    /* Time-range UI */
    .range-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .range-box {
      border: 1px solid #e6e6e6;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }
    .range-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 6px;
      align-items: center;
    }
    .range-row select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
      background: #fff;
    }
    .quick-row {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .quick-row label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    /* Minimal modal styles (for editing numbers) */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .modal {
      width: min(680px, 100%);
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      overflow: hidden;
    }
    .modal-header {
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e6e6e6;
    }
    .modal-body { padding: 14px; }
    .modal-actions {
      padding: 12px 14px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      border-top: 1px solid #e6e6e6;
      background: #fafafa;
    }
    .modal-close {
      background: transparent;
      border: 0;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
    }
    .field-row { display: grid; gap: 6px; margin: 10px 0; }
    .field-row input {
      padding: 10px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .clickable-metric {
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .clickable-metric.muted-cell {
      text-decoration: none;
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <header class="header">
    <h1>Competitor Metrics Dashboard</h1>
    <p class="subtle" id="lastUpdated"></p>
    <div style="margin-top: 8px;">
      <button id="lockBtn" type="button" class="hidden">Lock</button>
    </div>
  </header>

  <main class="main">
    <!-- Locked screen -->
    <section id="lockScreen" class="lockscreen">
      <h2>Locked</h2>
      <p class="muted">Enter the password to access the dashboard.</p>

      <label for="pagePassword" class="subtle">Password</label>
      <input id="pagePassword" type="password" autocomplete="current-password" />

      <div class="actions">
        <button id="unlockBtn" type="button">Unlock</button>
      </div>

      <p id="lockError" class="muted" style="color:#b00020; margin-top: 10px;"></p>
    </section>

    <!-- App -->
    <section id="appRoot" class="hidden">
      <section class="controls" id="controls">

        <!-- UPDATED Time Range block -->
        <div class="control-block">
          <h2>Time Range</h2>
          <p class="muted" style="margin-top:-4px;">Choose a custom start/end month, or use quick picks.</p>

          <div class="quick-row">
            <label><input type="checkbox" id="quickThisMonth" /> This Month</label>
            <label><input type="checkbox" id="quickLastMonth" /> Last Month</label>
          </div>

          <div class="range-grid">
            <div class="range-box">
              <div style="font-weight:700;">Start</div>
              <div class="range-row">
                <select id="startYear"></select>
                <select id="startMonth"></select>
              </div>
            </div>

            <div class="range-box">
              <div style="font-weight:700;">End</div>
              <div class="range-row">
                <select id="endYear"></select>
                <select id="endMonth"></select>
              </div>
            </div>
          </div>

          <div style="margin-top:10px;">
            <button id="applyRange" type="button">Apply Range</button>
          </div>
        </div>

        <div class="control-block">
          <h2>Companies</h2>
          <div class="control-actions">
            <button id="companiesAllOn" type="button">All on</button>
            <button id="companiesAllOff" type="button">All off</button>
          </div>
          <div id="companyToggle" class="toggle-grid"></div>
        </div>

        <div class="control-block">
          <h2>Datasets</h2>
          <div class="control-actions">
            <button id="datasetsAllOn" type="button">All on</button>
            <button id="datasetsAllOff" type="button">All off</button>
          </div>
          <div id="datasetToggle" class="toggle-grid"></div>
        </div>

        <div class="control-block">
          <h2>Export</h2>
          <div class="control-actions">
            <button id="exportCsv" type="button">Download CSV</button>
            <button id="exportXlsx" type="button">Download Excel (.xlsx)</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Metrics</h2>
        <p class="muted" style="margin-top:-6px;">
          Click a number to edit it. Changes save to Xano.
        </p>
        <div id="metricsDisplay" class="table-wrap"></div>
      </section>
    </section>
  </main>

  <!-- Edit Metric Modal -->
  <div id="editMetricModalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div style="font-weight: 700;">Edit value</div>
          <div class="subtle" id="editMetricSubtitle" style="margin-top: 2px;"></div>
        </div>
        <button class="modal-close" id="editMetricClose" aria-label="Close">✕</button>
      </div>

      <div class="modal-body">
        <div class="field-row">
          <label class="subtle" for="editMetricNewValue">New value</label>
          <input id="editMetricNewValue" type="number" inputmode="numeric" />
          <div class="subtle" id="editMetricHint"></div>
        </div>
      </div>

      <div class="modal-actions">
        <button id="editMetricUpdate" type="button">Update</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
