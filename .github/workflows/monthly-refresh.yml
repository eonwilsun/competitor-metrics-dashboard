name: Monthly refresh (SEMrush + GDELT)

on:
  workflow_dispatch:
  schedule:
    # 06:15 UTC on the 1st of every month
    - cron: "15 6 1 * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Refresh metrics.json
        env:
          SEMRUSH_API_KEY: ${{ secrets.SEMRUSH_API_KEY }}
          IG_SESSION_JSON: ${{ secrets.IG_SESSION_JSON }}
        run: node scripts/refresh-metrics.mjs

      - name: Commit updated metrics.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/metrics.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore: monthly metrics refresh"
          git push