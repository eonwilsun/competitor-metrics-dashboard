name: Generate runtime config (assets/config.js)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure assets directory
        run: mkdir -p assets

      - name: Write assets/config.js from secrets
        env:
          XANO_BASE_URL: ${{ secrets.XANO_BASE_URL }}
          ZAPIER_CATCH_HOOK_URL: ${{ secrets.ZAPIER_CATCH_HOOK_URL }}
        run: |
          node -e "const fs=require('fs'); const cfg={}; if(process.env.XANO_BASE_URL) cfg.XANO_BASE_URL=process.env.XANO_BASE_URL; if(process.env.ZAPIER_CATCH_HOOK_URL) cfg.ZAPIER_CATCH_HOOK_URL=process.env.ZAPIER_CATCH_HOOK_URL; fs.writeFileSync('assets/config.js', 'window.APP_CONFIG='+JSON.stringify(cfg,null,2)+';'); console.log('Wrote assets/config.js');"

      - name: Commit and push assets/config.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/config.js
          git commit -m "chore: generate assets/config.js [skip ci]" || echo "No changes to commit"
          git push
